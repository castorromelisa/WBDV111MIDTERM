<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOEWAHS MUSICS</title>
    <link rel="stylesheet" href="joewah.css">
    <style>
        body {
            background-image: url("bg.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover; 
            background-attachment: fixed; 
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-left">
            <div class="logo">
                <img src="JOE.png" alt="Logo">
            </div>
            <div class="search">
                <h1 class="neon-text" text-align="left">JOEWAHS MUSICS</h1>
            </div>
        <div class="log--out">
            <button class="log-out"> <a href="Home.html" style="text-decoration: none; color: inherit;">log-out</a></a> </button>
        </div>
    </header>

    <div class="main">
        <aside class="main-left-part neon-border"> 
            <div class="library">
                <p>Your Library</p>
                <div class="plus-icon">+</div>
            </div>

            <div class="box-container">
                <div class="box">
                    <h4>Create your first playlist</h4>
                    <p>It's easy, we'll help you</p>
                    <button class="pill-btn">Create playlist</button>
                </div>
                <div class="box">
                    <h4>Let's find some podcasts</h4>
                    <p>We'll keep you updated</p>
                    <button class="pill-btn">Browse podcasts</button>
                </div>
            </div>
        </aside>
        <div class="main-right-part neon-border">
            <div class="music-section">
    <h2>CUP OF JOE POPULAR SONGS</h2>
     <div class="songs">
            <!-- Music Card 1: Multo -->
<div class="music-card">
    <img src="multo.jpg" alt="Multo">
    <div class="img-title">Multo</div>
    <!-- UNIQUE ID: audio-multo -->
    <audio id="audio-multo" src="MULTO.mp3"></audio>
    <button onclick="document.getElementById('audio-multo').play()">Play</button>
    <button onclick="document.getElementById('audio-multo').pause(); document.getElementById('audio-multo').currentTime = 0;">Stop</button>
</div>

<!-- Music Card 2: Misteryoso -->
<div class="music-card">
    <img src="misteryoso.jpeg" alt="Misteryoso">
    <div class="img-title">Misteryoso</div>
    <!-- UNIQUE ID: audio-misteryoso -->
    <audio id="audio-misteryoso" src="Misteryoso.mp3"></audio>
    <!-- Buttons now target audio-misteryoso -->
    <button onclick="document.getElementById('audio-misteryoso').play()">Play</button>
    <button onclick="document.getElementById('audio-misteryoso').pause(); document.getElementById('audio-misteryoso').currentTime = 0;">Stop</button>
</div>

<!-- Music Card 3: Sandali -->
<div class="music-card">
    <img src="sandali.jpg" alt="Sandali">
    <div class="img-title">Sandali</div>
    <!-- UNIQUE ID: audio-sandali -->
    <audio id="audio-sandali" src="Sandali.mp3"></audio>
    <!-- Buttons now target audio-sandali -->
    <button onclick="document.getElementById('audio-sandali').play()">Play</button>
    <button onclick="document.getElementById('audio-sandali').pause(); document.getElementById('audio-sandali').currentTime = 0;">Stop</button>
</div>
            </div>
        </div>
</div>     
    </div>
