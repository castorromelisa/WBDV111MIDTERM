<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation | Luna Vista Resort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="reservation-page">
  <header class="topbar static-topbar">
    <a class="brand" href="index.html">Luna Vista Resort</a>
    <nav aria-label="Primary">
      <ul class="menu">
       <li><a href="Home.html">Home</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">About Luna Vista</a></li>
        <li><a href="reservation.html">Reservation</a></li>
        <li><a href="log-in.html">Log-in </a></li>
      </ul>
    </nav>
  </header>

 <main class="reservation-layout" id="reservation">
    <section class="carousel-card" id="gallery" aria-label="Resort highlights">
      <div class="carousel">
        <div class="slide active">
          <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=1600&q=80" alt="Luxury suite">
        </div>
        <div class="slide">
          <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb21031?auto=format&fit=crop&w=1600&q=80" alt="Resort pool">
        </div>
        <div class="slide">
          <img src="https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&fit=crop&w=1600&q=80" alt="Beachfront dinner">
        </div>

        <button class="carousel-btn prev" type="button" aria-label="Previous image">&#10094;</button>
        <button class="carousel-btn next" type="button" aria-label="Next image">&#10095;</button>
      </div>

      <div class="dots" aria-label="Select image">
        <button class="dot active" type="button"></button>
        <button class="dot" type="button"></button>
        <button class="dot" type="button"></button>
      </div>
    </section>

    <section class="reservation-card">
      <h1 class="info-title">BOOK/RESERVATION</h1>
      <p class="res-subtext">Complete your information to secure your booking at Luna Vista.</p>

      <form class="reservation-form" id="reservationForm">
        <div class="input-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" placeholder="John Doe" required>
        </div>

        <div class="two-col">
            <div class="input-group">
                <label for="resEmail">Email Address</label>
                <input id="resEmail" name="resEmail" type="email" placeholder="john@example.com" required>
            </div>
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input id="phone" name="phone" type="tel" placeholder="+1 234..." required>
            </div>
        </div>

        <div class="two-col">
          <div class="input-group">
            <label for="checkIn">Check-In</label>
            <input id="checkIn" name="checkIn" type="date" required>
          </div>
          <div class="input-group">
            <label for="checkOut">Check-Out</label>
            <input id="checkOut" name="checkOut" type="date" required>
          </div>
        </div>

        <div class="two-col">
          <div class="input-group">
            <label for="guests">Guests</label>
            <input id="guests" name="guests" type="number" min="1" max="12" value="1" required>
          </div>
          <div class="input-group">
            <label for="roomType">Room Type</label>
            <select id="roomType" name="roomType" required>
              <option value="">Choose room</option>
              <option>Deluxe Suite</option>
              <option>Ocean Villa</option>
              <option>Family Room</option>
            </select>
          </div>
        </div>

        <div class="input-group">
            <label for="requests">Special Requests</label>
            <textarea id="requests" name="requests" rows="2" placeholder="Airport pickup, dietary needs, etc."></textarea>
        </div>

        <button class="submit-btn" type="submit">Confirm Reservation</button>
      </form>
    </section>
</main>


  <script src="script.js"></script>
</body>
</html>
