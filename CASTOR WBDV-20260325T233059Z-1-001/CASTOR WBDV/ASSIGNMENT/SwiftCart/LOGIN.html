<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SwiftCart | Official Store</title>
    <link rel="stylesheet" href="LOGIN.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <h1>Register Account</h1>
                <input type="text" placeholder="First Name*" required>
                <input type="text" placeholder="Last Name*" required>
                <input type="email" placeholder="Email Address*" required>
                <input type="password" placeholder="Password*" required>
                <input type="date" id="date-input" name="date-input">
                <button type="submit">Create Account</button>
            </form>
        </div>

        <div class="form-container sign-in">
    <form action="Store.html">
        <h1>Log In</h1>
        <input type="email" id="login-email" placeholder="Email Address" required>
        
        <div class="pass-wrapper" style="width: 100%; position: relative;">
            <input type="password" id="login-pass" placeholder="Password" required style="width: 100%;" required> 
        </div>

        <a href="#" style="text-decoration: none; color: rgb(88, 88, 88);">Forgot your Password?</a> 
        
        <button type="submit" id="login-btn" disabled style="opacity: 0.5; cursor: not-allowed;">
            Log-in
        </button>

        <p>Don't have an account yet? <a href="#" id="register-toggle" style="text-decoration: none; color: rgb(88, 88, 88);" >Register Here</a></p>
    </form>
</div>

        <div class="toggle-container">
            <img src="wallet.png">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                </div>
                <div class="toggle-panel toggle-right">
                </div>
            </div>
        </div>
    </div>

    
    <script src="LOGIN.js"></script>
</body>
</html>
