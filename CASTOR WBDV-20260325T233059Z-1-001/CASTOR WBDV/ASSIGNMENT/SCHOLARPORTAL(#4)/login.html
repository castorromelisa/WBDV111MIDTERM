<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarPortal | Secure Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="portal-container">
        <div class="login-card">
            <header class="card-header">
                <div class="logo">Scholar<span>Portal</span></div>
                <h1>Sign In</h1>
                <p class="step-indicator">Step 1: Verify Identity</p>
            </header>

            <form action="#" class="portal-form">
                <div class="input-group">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" name="studentId" placeholder="e.g. 1002456" required autofocus>
                </div>

                <div class="input-group">
                    <label for="email">Institutional Email</label>
                    <input type="email" id="email" name="email" placeholder="name@university.edu" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

               <!-- The link will act as a button and navigate to index.html -->
            <a class="btn-submit" href="index.html" role="button" style="text-decoration: none; display: inline-block; text-align: center;">Login</a>

            </form>

            <footer class="card-footer">
                <a href="#">Forgot Student ID?</a>
                <span class="divider">|</span>
                <a href="#">Reset Password</a>
            </footer>

</body>
</html>
