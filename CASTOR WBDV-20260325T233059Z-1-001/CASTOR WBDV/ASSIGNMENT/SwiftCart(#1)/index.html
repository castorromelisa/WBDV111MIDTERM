<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCart | Official Store</title>
    <link rel="stylesheet" href="Store.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">SwiftCart</div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Product</a></li>
        <li><a href="#" id="track-nav">Track Order</a></li>
    </ul>
    <div>
        <button id="cart-btn"><i class="fas fa-shopping-cart"></i> Cart</button>
    </div>
</nav>

<div class="products">
    <div class="product">
        <img src="laptop.jpg" alt="Laptop Acer">
        <h3>Laptop Acer</h3>
        <p>P 2,500.00</p>
        <button class="add-to-cart" data-name="Laptop Acer" data-price="2500">Add to Cart</button>
    </div>
    <div class="product">
        <img src="phone.jpg" alt="Iphone 17">
        <h3>Iphone 17</h3>
        <p>P 10,000.00</p>
        <button class="add-to-cart" data-name="Iphone 17" data-price="10000">Add to Cart</button>
    </div>
    <div class="product">
        <img src="Chia_Black_1.webp" alt="CLN Bag">
        <h3>CLN BAG</h3>
        <p>P 500.00</p>
        <button class="add-to-cart" data-name="CLN BAG" data-price="500">Add to Cart</button>
    </div>
    <div class="product">
        <img src="nintendo-switch2_HP.webp" alt="Nintendo Switch">
        <h3>Nintendo Switch</h3>
        <p>P 10,000.00</p>
        <button class="add-to-cart" data-name="Nintendo Switch" data-price="10000">Add to Cart</button>
    </div>
</div>

<div class="modal" id="cart-modal">
    <div class="modal-content">
        <h2>Shopping Cart</h2>
        <ul id="cart-items"></ul>
        <div class="total-section">
            <p>Total: P <span id="cart-total">0.00</span></p>
        </div>
        <button id="checkout-btn">Check Out</button>
        <button class="close-btn" id="close-cart">Close</button>
    </div>
</div>

<div class="modal" id="checkout-modal">
    <div class="modal-content">
        <h2>Check Out</h2>
        <ul id="checkout-items"></ul>
        <div class="total-section">
            <p>Total: P <span id="checkout-total">0.00</span></p>
        </div>
        <form id="payment-form">
            <input type="text" id="card-number" placeholder="Card Number" required>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="expiry-date" placeholder="MM/YY" required>
                <input type="text" id="cvv" placeholder="CVV" required>
            </div>
            <button type="submit" id="complete-purchase">Complete Purchase</button>
        </form>
        <button class="close-btn" id="close-checkout">Cancel</button>
    </div>
</div>

<div class="modal" id="track-modal">
    <div class="modal-content">
        <h2>Track Your Order</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="fa-solid fa-truck-fast fa-3xl" style="font-size: 3rem; color: #7f8c8d;"></i>
        </div>
        <input type="text" id="tracking-number" placeholder="Order or Tracking Number" required 
               style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
        <button type="button" id="track-btn" class="add-to-cart">Track Status</button>
        
        <div id="tracking-result" style="margin-top: 15px; display: none; text-align: left; padding: 10px; background: #f9f9f9; border-radius: 5px;">
            <p><strong>Status:</strong> <span id="status-text">In Transit</span></p>
            <progress value="70" max="100" style="width: 100%; margin-top: 10px;"></progress>
        </div>
        <button class="close-btn" id="close-track" style="margin-top: 15px; background: none; border: none; text-decoration: underline; cursor: pointer;">Close</button>
    </div>
</div>
 <script src="Tracking.js"> </script>
 <script src="Store.js"></script>
</body>
</html>
