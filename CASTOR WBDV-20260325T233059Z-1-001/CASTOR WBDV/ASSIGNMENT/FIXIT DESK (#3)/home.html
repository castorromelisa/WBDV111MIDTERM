<!DOCTYPE html>
<html>
<head>
    <title>FixIt Desk | Systems</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
     <header class="top-nav">
        <div class="brand">FIXIT_DESK</div>
       <button class="logout-btn" onclick="window.location.href='login.html'">[ LOGOUT ]</button>
    </header>

    <div class="app-container">
        <div class="sidebar">
            <button class="new-ticket-btn" id="openTicketBtn">+ OPEN_NEW_TICKET</button>
            
            <div class="sidebar-header">HISTORY_LOGS</div>
            <div id="ticketList">
                <div class="ticket-item">#001 - OPEN</div>
                <div class="ticket-item">#002 - CLOSED</div>
                <div class="ticket-item">#003 - CLOSED</div>
            </div>
        </div>

        <div class="main-terminal">
            <div class="chat-display" id="chatDisplay">
                <div class="log-entry">> SYSTEM: INITIALIZING SUPPORT CHANNEL...</div>
                <div class="log-entry">> USER: I NEED HELP WITH MY MONITOR.</div>
                <div class="log-entry">> AGENT: PLEASE ATTACH SCREENSHOT AND TAG CATEGORY.</div>
                <span class="cursor"></span>
            </div>

            <div class="input-zone">
                <div class="row">
                    <select id="categoryTag">
                        <option value="HARDWARE">TAG: HARDWARE</option>
                        <option value="SOFTWARE">TAG: SOFTWARE</option>
                    </select>
                    <input type="file" id="fileInput" class="file-input">
                </div>
                <div class="row">
                    <input type="text" id="cmdInput" placeholder="TYPE_MESSAGE_HERE..." class="cmd-input">
                    <button class="btn" id="sendBtn">EXECUTE_SEND</button>
                </div>
            </div>
        </div>
    </div>
    <script src="home.js"> </script>
</body>
</html>
