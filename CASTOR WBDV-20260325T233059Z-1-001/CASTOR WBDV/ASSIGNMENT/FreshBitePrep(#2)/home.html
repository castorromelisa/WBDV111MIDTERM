<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshBite Prep | Professional Meal Delivery</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
   
    <nav class="navbar">
        <p class="logo">FreshBite Prep</p>
        <ul class="nav-links"> 
            <li><a href="home.html">Meals</a></li>
            <li><a href="plans.html">Plans</a></li>
            <li><a href="billing.html">Billing</a></li>
        </ul>
        <button class="login-trigger" onclick="toggleDrawer()">Login</button>
    </nav>

    <div class="workflow">
        <div class="steps">
            Select Diet Type &rarr; <span class="active">Choose Weekly Meals</span> &rarr; Enter Delivery &rarr; View Macros
        </div>
    </div>

    <div class="container">
        <section id="meals-section">
            <h2 class="section-title">Weekly Menu</h2>
            <div class="gallery">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300" class="card-img" alt="Quinoa Bowl">
                    <div class="card-body">
                        <h3>Quinoa Bowl</h3>
                        <p class="price">$12.00</p>
                        <div class="macros">P: 20g | C: 45g | F: 10g</div>
                        <button class="buy-btn" onclick="purchaseMeal('Quinoa Bowl')">Add to Order</button>
                    </div>
                </div>
                <div class="card">
                    <img src="https://recipesblob.oetker.co.uk/assets/4acbec1ea07846acb27a8abc3c4d0738/750x910/american-pancakes-v1.webp" class="card-img" alt="Pancakes">
                    <div class="card-body">
                        <h3>Pancake Stack</h3>
                        <p class="price">$10.00</p>
                        <div class="macros">P: 12g | C: 60g | F: 15g</div>
                        <button class="buy-btn" onclick="purchaseMeal('Pancake Stack')">Add to Order</button>
                    </div>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300" class="card-img" alt="Greek Salad">
                    <div class="card-body">
                        <h3>Greek Salad</h3>
                        <p class="price">$11.00</p>
                        <div class="macros">P: 8g | C: 12g | F: 22g</div>
                        <button class="buy-btn" onclick="purchaseMeal('Greek Salad')">Add to Order</button>
                    </div>
                </div>
            </div>
        </section>


    <div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
    <div class="drawer" id="drawer">
        <span class="close-btn" onclick="toggleDrawer()">&times;</span>
        <h2 style="margin-top: 40px;">Account Login</h2>
        <form onsubmit="event.preventDefault(); alert('Logged in!'); toggleDrawer();">
            <label>Email Address</label>
            <input type="email" placeholder="email@example.com" required>
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
            <button type="submit" class="buy-btn">Sign In</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
