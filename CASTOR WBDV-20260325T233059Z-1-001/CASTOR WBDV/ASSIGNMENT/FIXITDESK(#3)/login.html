<!DOCTYPE html>
<html>
<head>
    <title>FixIt Desk </title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="terminal-window">
    <div class="header">
        > FIXIT_DESK<br>
        > INITIALIZING SECURE ACCESS...
    </div>

    <form action="#">
        <div class="login-line">
            <span class="prompt">USER_ID:</span>
            <input type="text" spellcheck="false" autofocus>
        </div>

        <div class="login-line">
            <span class="prompt">PASSWORD:</span>
            <input type="password">
            <span class="cursor-line"></span>
        </div>

        <button type="button" class="btn-login" onclick="window.location.href='index.html'">
       [ EXECUTE_LOGIN ]
       </button>
    </form>

    <div class="system-msg">
        * WARNING: UNAUTHORIZED ACCESS PROHIBITED<br>
        * CONNECTION: ENCRYPTED_AES_256
    </div>
</div>

</body>
</html>
